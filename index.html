<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini Blog</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="page">

        <header class="hero">
            <h1>Mini Blog</h1>
            <p class="subtitle">Consulta, busca y crea publicaciones usando DummyJSON.</p>
        </header>

        <section class="card">
            <h2>Buscar posts</h2>

            <div class="search-row">
                <input id="searchInput" type="text" placeholder="Escribe una palabra para buscar...">
                <button type="button" onclick="searchPosts()">Buscar</button>
            </div>
        </section>

        <section class="card">
            <h2>Crear Post</h2>

            <div class="form-group">
                <input id="title" type="text" placeholder="Título">
            </div>

            <div class="form-group">
                <textarea id="body" placeholder="Contenido"></textarea>
            </div>

            <div class="button-left">
                <button type="button" onclick="createPost()">Publicar</button>
            </div>
        </section>

        <section class="card">
            <h2>Estado de la aplicación</h2>

            <div id="idleState" class="state-box">
                Esperando acción...
            </div>

            <div id="loadingState" class="state-box hidden">
                Cargando posts...
            </div>

            <div id="emptyState" class="state-box hidden">
                No se encontraron resultados.
            </div>

            <div id="errorState" class="state-box hidden">
                Ocurrió un error al cargar los posts.
                <div class="retry-row">
                    <button type="button" onclick="loadPosts()">Retry</button>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Publicaciones</h2>
            <section id="postsContainer" class="posts-grid"></section>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
